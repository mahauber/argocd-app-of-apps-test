apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: stackit-test-app-of-apps
spec:
  project: default
  source:
    repoURL: https://github.com/mahauber/argocd-app-of-apps-test
    targetRevision: HEAD
    path: charts/general
    helm:
      valueFiles:
        - ../../cluster/test/values-cluster2.yaml
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
